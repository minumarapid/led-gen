name: Release CLI
on:
  push:
    tags:
      - 'cli@*'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: led-gen-linux
            asset_name: led-gen-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: led-gen-mac
            asset_name: led-gen-darwin-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: led-gen.exe
            asset_name: led-gen-windows-amd64.exe

    steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Set up Rust
          uses: dtolnay/rust-toolchain@stable
          with:
            targets: ${{ matrix.target }}

        - name: Build CLI
          run: cargo build --release -p led-gen-cli --target ${{ matrix.target }}

        - name: Rename Binary (Linux/Mac)
          if: matrix.os != 'windows-latest'
          run: mv target/${{ matrix.target }}/release/led-gen ${{ matrix.asset_name }}

        - name: Rename Binary (Windows)
          if: matrix.os == 'windows-latest'
          run: move target\${{ matrix.target }}\release\led-gen.exe ${{ matrix.asset_name }}

        - name: Upload Release Asset
          uses: softprops/action-gh-release@v2
          with:
            files: ${{ matrix.asset_name }}
            generate_release_notes: true